<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYOTAK Catch Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root{--bg:#0B1E31;--surface:#112640;--border:#1e3a5c;--accent:#C5A059;--accent-dim:#8a6f3a;--text:#e6edf3;--muted:#7d8f9f;--success:#3fb950;--error:#f85149}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  header h1{font-size:17px;font-weight:700;color:var(--accent)}
  header span{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}
  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .card-title{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .card-body{padding:16px}
  textarea.finput,input.finput{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:14px;border-radius:6px;outline:none;transition:border-color .2s;resize:vertical;min-height:40px}
  textarea.finput{min-height:80px}
  textarea.finput:focus,input.finput:focus{border-color:var(--accent)}
  textarea.finput::placeholder,input.finput::placeholder{color:#445566}
  textarea.finput:read-only,input.finput:read-only{opacity:.7;border-color:transparent;background:transparent;resize:none}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .photo-thumb .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(248,81,73,.9);border:none;border-radius:50%;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
  .btn{width:100%;padding:14px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  .btn:active{opacity:.8;transform:scale(.98)}
  .btn-primary{background:var(--accent);color:var(--bg)}
  .btn-primary:disabled{background:var(--accent-dim);opacity:.5;cursor:not-allowed}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn-success{background:var(--success);color:#fff}
  .btn-success:disabled{opacity:.5;cursor:not-allowed}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid transparent;border-top:2px solid currentColor;border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result{display:none}
  .result.show{display:block}
  .edit-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;margin-top:12px}
  .edit-label:first-child{margin-top:0}
  .tag-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13px;border-radius:6px;outline:none}
  .tag-input:focus{border-color:var(--accent)}
  .tag-input:read-only{opacity:.7;border-color:transparent;background:transparent}
  .result-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{background:rgba(197,160,89,.15);color:var(--accent);padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700}
  .img-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
  .img-card-header{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px}
  .img-card-meta{font-size:12px;color:var(--muted);margin-bottom:4px;word-break:break-all;line-height:1.5}
  .img-card img{width:100%;border-radius:6px;margin-top:8px}
  .copy-area{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;position:relative}
  .copy-area pre{font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text);max-height:300px;overflow-y:auto}
  .copy-btn{position:absolute;top:8px;right:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:'Share Tech Mono',monospace}
  .copy-btn:active{background:var(--accent);color:var(--bg)}
  .err-msg{background:#1a0808;border:1px solid #5a1a1a;border-radius:8px;padding:10px 12px;margin-bottom:10px;display:none;font-size:13px;color:#ff8080}
  .err-msg.show{display:block}
  .success-msg{background:#0a1a0a;border:1px solid #1a5a1a;border-radius:8px;padding:10px 12px;margin-bottom:10px;display:none;font-size:13px;color:var(--success)}
  .success-msg.show{display:block}
  .status-bar{display:flex;gap:8px;margin-bottom:12px}
  .status-bar .step{flex:1;text-align:center;padding:6px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg);color:var(--muted);border:1px solid var(--border)}
  .status-bar .step.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .status-bar .step.done{background:rgba(63,185,80,.15);color:var(--success);border-color:var(--success)}
  .fish-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .fish-row .weight-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .fish-row input[type=number]{width:70px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;font-size:14px;border-radius:6px;outline:none;text-align:right}
  .fish-row input[type=number]:focus{border-color:var(--accent)}
  .fish-row .unit{color:var(--muted);font-size:13px;font-weight:700}
  /* Custom fish dropdown (replaces native select, supports thumbnail in list) */
  .fish-dropdown{flex:1;position:relative;min-width:0}
  .fish-dropdown-selected{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-size:14px;border-radius:6px;min-height:44px;cursor:pointer;user-select:none}
  .fish-dropdown.open .fish-dropdown-selected{border-color:var(--accent)}
  .fish-dropdown-thumb{width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
  .fish-dropdown-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fish-dropdown-label.placeholder{color:#445566}
  .fish-dropdown-arrow{flex-shrink:0;color:var(--muted);font-size:12px;transition:transform .15s}
  .fish-dropdown.open .fish-dropdown-arrow{transform:rotate(180deg)}
  /* position:fixed + JS-driven top/left/width avoids clipping by any
     overflow:hidden ancestor (previous position:absolute got clipped
     by .card / .card-body / .fish-row). JS sets coordinates on open
     using the trigger's getBoundingClientRect(). */
  .fish-dropdown-list{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:280px;overflow-y:auto;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .fish-dropdown-list[hidden]{display:none}
  .fish-dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--border);min-height:48px}
  .fish-dropdown-item:last-child{border-bottom:none}
  .fish-dropdown-item:hover,.fish-dropdown-item.active{background:rgba(197,160,89,.12)}
  .fish-dropdown-item img{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
  .fish-dropdown-item img.missing{display:none}
  .fish-dropdown-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>

<script>
const API_BASE = 'https://line-harness.gyotak.workers.dev/gyotak';
const AUTH = 'Bearer gyotak-gas-2026-secret-key';

let photos = [];
let currentData = null;
let fishMasterData = []; // cached from /api/fish-master

// Fish thumbnail source (nothing hardcoded beyond this base)
const FISH_THUMB_BASE = 'https://gyotak-shop.pages.dev/images/thumbs/';

// Fetch fish master on load, then init custom dropdowns
(async function loadFishMaster() {
  try {
    const res = await fetch('https://line-harness.gyotak.workers.dev/api/fish-master');
    const data = await res.json();
    if (data.success && data.fish_master) {
      fishMasterData = data.fish_master;
      document.querySelectorAll('.fish-dropdown').forEach(initFishDropdown);
    }
  } catch (e) {
    console.warn('Fish master fetch failed, fallback to comment input:', e);
  }
})();

// Build one custom dropdown (populates list items + wires events).
// Each list item: thumbnail + romaji name. Thumbnail 404 hides the img
// (label still shows the name). Clicking an item commits the value,
// updates the selected header (thumb + name), and closes the list.
function initFishDropdown(dropdown) {
  const selected = dropdown.querySelector('.fish-dropdown-selected');
  const headerThumb = dropdown.querySelector('.fish-dropdown-thumb');
  const label = dropdown.querySelector('.fish-dropdown-label');
  const list = dropdown.querySelector('.fish-dropdown-list');

  // Blank first entry to let users unset a choice.
  list.innerHTML = '';
  const blank = document.createElement('div');
  blank.className = 'fish-dropdown-item';
  blank.dataset.value = '';
  const blankSpan = document.createElement('span');
  blankSpan.textContent = '-- (none)';
  blank.appendChild(blankSpan);
  list.appendChild(blank);

  fishMasterData.forEach(f => {
    const item = document.createElement('div');
    item.className = 'fish-dropdown-item';
    item.dataset.value = f.romaji;
    const img = document.createElement('img');
    img.alt = '';
    img.src = FISH_THUMB_BASE + encodeURIComponent(f.romaji) + '.jpg';
    img.onerror = function() { this.classList.add('missing'); };
    const span = document.createElement('span');
    span.textContent = f.romaji;
    item.appendChild(img);
    item.appendChild(span);
    list.appendChild(item);
  });

  selected.addEventListener('click', function(e) {
    e.stopPropagation();
    // Close any other open dropdown first (only one open at a time)
    document.querySelectorAll('.fish-dropdown.open').forEach(d => {
      if (d !== dropdown) {
        d.classList.remove('open');
        const otherList = d.querySelector('.fish-dropdown-list');
        if (otherList) otherList.hidden = true;
      }
    });
    const nowOpen = dropdown.classList.toggle('open');
    list.hidden = !nowOpen;
    if (nowOpen) {
      positionFishDropdownList(dropdown);
    }
  });

  list.addEventListener('click', function(e) {
    const item = e.target.closest('.fish-dropdown-item');
    if (!item) return;
    e.stopPropagation();
    const romaji = item.dataset.value || '';
    dropdown.dataset.value = romaji;
    if (romaji) {
      label.textContent = romaji;
      label.classList.remove('placeholder');
      headerThumb.onerror = function() { this.hidden = true; };
      headerThumb.src = FISH_THUMB_BASE + encodeURIComponent(romaji) + '.jpg';
      headerThumb.hidden = false;
    } else {
      label.textContent = '--';
      label.classList.add('placeholder');
      headerThumb.hidden = true;
      headerThumb.removeAttribute('src');
    }
    dropdown.classList.remove('open');
    list.hidden = true;
  });
}

// Position the list in viewport coordinates (position:fixed).
// Using getBoundingClientRect on the trigger means the list escapes
// any overflow:hidden ancestor (the previous position:absolute was
// clipped by .card / .fish-row).
function positionFishDropdownList(dropdown) {
  const selected = dropdown.querySelector('.fish-dropdown-selected');
  const list = dropdown.querySelector('.fish-dropdown-list');
  if (!selected || !list) return;
  const rect = selected.getBoundingClientRect();
  list.style.left = rect.left + 'px';
  list.style.top = (rect.bottom + 4) + 'px';
  list.style.width = rect.width + 'px';
}

// Close all dropdowns when clicking outside any .fish-dropdown
document.addEventListener('click', function(e) {
  if (!e.target.closest('.fish-dropdown')) {
    document.querySelectorAll('.fish-dropdown.open').forEach(d => {
      d.classList.remove('open');
      const l = d.querySelector('.fish-dropdown-list');
      if (l) l.hidden = true;
    });
  }
});

// position:fixed means the list does not follow the trigger when the
// page (or any ancestor) scrolls. Close it instead — simpler & robust
// than constantly recomputing. Capture phase catches scrolls on any
// scrollable ancestor, not just window.
function closeAllFishDropdowns() {
  document.querySelectorAll('.fish-dropdown.open').forEach(d => {
    d.classList.remove('open');
    const l = d.querySelector('.fish-dropdown-list');
    if (l) l.hidden = true;
  });
}
window.addEventListener('scroll', closeAllFishDropdowns, true);
window.addEventListener('resize', closeAllFishDropdowns);

const cameraInput = document.getElementById('cameraInput');
const photoGrid = document.getElementById('photoGrid');
const submitBtn = document.getElementById('submitBtn');
const errMsg = document.getElementById('errMsg');

function parseExifDateTime(buf) {
  const view = new DataView(buf);
  if (view.getUint16(0) !== 0xFFD8) return null;
  let off = 2;
  while (off < view.byteLength - 1) {
    const marker = view.getUint16(off);
    if (marker === 0xFFE1) {
      return readExifDateFromApp1(new DataView(buf, off + 4, view.getUint16(off + 2) - 2));
    }
    if ((marker & 0xFF00) !== 0xFF00) break;
    off += 2 + view.getUint16(off + 2);
  }
  return null;
}
function readExifDateFromApp1(exif) {
  const hdr = String.fromCharCode(exif.getUint8(0), exif.getUint8(1), exif.getUint8(2), exif.getUint8(3));
  if (hdr !== 'Exif') return null;
  const T = 6;
  const le = exif.getUint16(T) === 0x4949;
  const g16 = (o) => exif.getUint16(T + o, le);
  const g32 = (o) => exif.getUint32(T + o, le);
  const ifd0Off = g32(4);
  const ifd0Cnt = g16(ifd0Off);
  let exifIfdOff = 0;
  for (let i = 0; i < ifd0Cnt; i++) {
    const e = ifd0Off + 2 + i * 12;
    if (g16(e) === 0x8769) { exifIfdOff = g32(e + 8); break; }
  }
  if (!exifIfdOff) return null;
  const exifCnt = g16(exifIfdOff);
  for (let i = 0; i < exifCnt; i++) {
    const e = exifIfdOff + 2 + i * 12;
    if (g16(e) === 0x9003) {
      const count = g32(e + 4);
      const valOff = g32(e + 8);
      let str = '';
      for (let j = 0; j < count - 1; j++) str += String.fromCharCode(exif.getUint8(T + valOff + j));
      return str;
    }
  }
  return null;
}
function parseExifGps(buf) {
  const view = new DataView(buf);
  if (view.getUint16(0) !== 0xFFD8) return null;
  let off = 2;
  while (off < view.byteLength - 1) {
    const marker = view.getUint16(off);
    if (marker === 0xFFE1) {
      const len = view.getUint16(off + 2);
      const exif = new DataView(buf, off + 4, len - 2);
      const hdr = String.fromCharCode(exif.getUint8(0), exif.getUint8(1), exif.getUint8(2), exif.getUint8(3));
      if (hdr !== 'Exif') return null;
      const T = 6;
      const le = exif.getUint16(T) === 0x4949;
      const g16 = (o) => exif.getUint16(T + o, le);
      const g32 = (o) => exif.getUint32(T + o, le);
      const ifd0Off = g32(4);
      const ifd0Cnt = g16(ifd0Off);
      let gpsOff = 0;
      for (let i = 0; i < ifd0Cnt; i++) {
        const e = ifd0Off + 2 + i * 12;
        if (g16(e) === 0x8825) { gpsOff = g32(e + 8); break; }
      }
      if (!gpsOff) return null;
      const gpsCnt = g16(gpsOff);
      let latRef = '', lonRef = '', latOff = 0, lonOff = 0;
      for (let i = 0; i < gpsCnt; i++) {
        const e = gpsOff + 2 + i * 12;
        const tag = g16(e);
        if (tag === 1) latRef = String.fromCharCode(exif.getUint8(T + e + 8));
        if (tag === 2) latOff = g32(e + 8);
        if (tag === 3) lonRef = String.fromCharCode(exif.getUint8(T + e + 8));
        if (tag === 4) lonOff = g32(e + 8);
      }
      let altRef = 0, altOff = 0;
      for (let i = 0; i < gpsCnt; i++) {
        const e = gpsOff + 2 + i * 12;
        const tag = g16(e);
        if (tag === 5) altRef = exif.getUint8(T + e + 8);
        if (tag === 6) altOff = g32(e + 8);
      }
      if (!latOff || !lonOff) return null;
      const readDMS = (o) => {
        const d = g32(o) / (g32(o+4)||1);
        const m = g32(o+8) / (g32(o+12)||1);
        const s = g32(o+16) / (g32(o+20)||1);
        return d + m/60 + s/3600;
      };
      let lat = readDMS(latOff);
      let lon = readDMS(lonOff);
      if (latRef === 'S') lat = -lat;
      if (lonRef === 'W') lon = -lon;
      if (lat === 0 && lon === 0) return null;
      let alt = null;
      if (altOff) {
        const num = g32(altOff);
        const den = g32(altOff + 4) || 1;
        alt = num / den;
        if (altRef === 1) alt = -alt;
      }
      return { lat, lon, alt };
    }
    if ((marker & 0xFF00) !== 0xFF00) break;
    off += 2 + view.getUint16(off + 2);
  }
  return null;
}

function stripJpegMetadata(buf) {
  const src = new Uint8Array(buf);
  const view = new DataView(src.buffer, src.byteOffset, src.byteLength);
  if (src.byteLength < 4 || view.getUint16(0) !== 0xFFD8) return src;
  const chunks = [src.subarray(0, 2)];
  let off = 2;
  while (off < src.byteLength - 1) {
    if (src[off] !== 0xFF) break;
    const marker = src[off + 1];
    if (marker === 0xDA) { chunks.push(src.subarray(off)); break; }
    if (marker === 0xD9) { chunks.push(src.subarray(off, off + 2)); break; }
    if (off + 4 > src.byteLength) break;
    const len = view.getUint16(off + 2);
    if (off + 2 + len > src.byteLength) break;
    const strip = (marker >= 0xE0 && marker <= 0xEF) || marker === 0xFE;
    if (!strip) chunks.push(src.subarray(off, off + 2 + len));
    off += 2 + len;
  }
  let total = 0;
  for (const c of chunks) total += c.byteLength;
  const out = new Uint8Array(total);
  let pos = 0;
  for (const c of chunks) { out.set(c, pos); pos += c.byteLength; }
  return out;
}

function formatFileDate(file) {
  const d = new Date(file.lastModified);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}:${pad(d.getMonth()+1)}:${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

let hasGps = false;
async function handleFiles(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const buffer = await file.arrayBuffer();
    const exifDateTime = parseExifDateTime(buffer) || formatFileDate(file);
    const gps = parseExifGps(buffer);
    const stripped = stripJpegMetadata(buffer);
    const blob = new Blob([stripped], { type: file.type });
    const previewUrl = URL.createObjectURL(blob);
    photos.push({ file, buffer, stripped, exifDateTime, previewUrl, gps });
  }
  renderGrid();
  updateGpsStatus();
  errMsg.classList.remove('show');
  e.target.value = '';
}
function updateGpsStatus() {
  hasGps = photos.some(p => p.gps);
  const statusEl = document.getElementById('gpsStatus');
  const warnEl = document.getElementById('gpsWarning');
  if (photos.length === 0) {
    statusEl.style.display = 'none';
    warnEl.style.display = 'none';
    submitBtn.disabled = true;
    return;
  }
  statusEl.style.display = '';
  if (hasGps) {
    statusEl.innerHTML = '<span style="color:var(--success)">🟢 GPS OK</span>'
      + '<div style="margin-top:4px;font-size:11px;color:var(--muted);font-weight:400">'
      + '🔒 GPS座標を記録しました(非公開) / 写真からは EXIF 剥離済'
      + '</div>';
    warnEl.style.display = 'none';
    submitBtn.disabled = false;
  } else {
    statusEl.innerHTML = '<span style="color:var(--error)">🔴 No GPS</span>';
    warnEl.style.display = '';
    warnEl.textContent = '⚠️ GPS data not found. Please retake the photo only. Your comment will be kept.';
    submitBtn.disabled = true;
  }
}
cameraInput.addEventListener('change', handleFiles);

function renderGrid() {
  photoGrid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${p.previewUrl}"><button class="remove-btn" onclick="removePhoto(${i})">×</button>`;
    photoGrid.appendChild(div);
  });
}
function removePhoto(i) {
  URL.revokeObjectURL(photos[i].previewUrl);
  photos.splice(i, 1);
  renderGrid();
  updateGpsStatus();
}

async function generate() {
  if (photos.length === 0) return;
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Generating...';
  errMsg.classList.remove('show');

  try {
    const form = new FormData();
    for (const p of photos) {
      const blob = new Blob([p.stripped], { type: p.file.type });
      form.append('image', blob, p.file.name);
      form.append('gps_lat', p.gps ? String(p.gps.lat) : '');
      form.append('gps_lng', p.gps ? String(p.gps.lon) : '');
      form.append('gps_alt', p.gps && p.gps.alt != null ? String(p.gps.alt) : '');
      form.append('photo_taken_at', p.exifDateTime || '');
    }
    const authorVal = document.getElementById('authorSelect').value;
    const rawComment = document.getElementById('comment').value;
    let fullComment = rawComment;
    if (authorVal) {
      const slashIdx = authorVal.indexOf(' / ');
      const name = slashIdx >= 0 ? authorVal.substring(0, slashIdx).trim() : authorVal;
      const personality = slashIdx >= 0 ? authorVal.substring(slashIdx + 3).trim() : '';
      fullComment = personality
        ? `[投稿者: ${name} / 性格: ${personality}] ${rawComment}`
        : `[投稿者: ${name}] ${rawComment}`;
    }
    form.append('comment', fullComment);

    // Collect fish_items from dropdowns (v3)
    const fishItems = [];
    document.querySelectorAll('.fish-row').forEach(row => {
      const dropdown = row.querySelector('.fish-dropdown');
      const wInput = row.querySelector('.fish-weight');
      const romaji = dropdown && dropdown.dataset.value;
      if (romaji) {
        const master = fishMasterData.find(f => f.romaji === romaji);
        if (master) {
          fishItems.push({
            romaji: master.romaji,
            en: master.en,
            th: master.th,
            ja: master.ja,
            weight_kg: parseFloat(wInput.value) || 0,
          });
        }
      }
    });
    form.append('fish_items', JSON.stringify(fishItems));

    const res = await fetch(API_BASE + '/catch-report', {
      method: 'POST',
      headers: { 'Authorization': AUTH },
      body: form,
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    if (data.images) {
      data.images.forEach((img, i) => {
        img._exifDateTime = photos[i]?.exifDateTime || null;
      });
    }
    currentData = data;
    showResult(data);
  } catch (err) {
    errMsg.textContent = err.message;
    errMsg.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.innerHTML = '📝 Generate Article';
  }
}

function showResult(data) {
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('resultSection').classList.add('show');

  document.getElementById('editTitle').value = data.title || '';
  document.getElementById('editBody').value = data.body || '';
  document.getElementById('editTags').value = (data.hashtags || []).join(' ');
  renderTagPreview();

  const imagesEl = document.getElementById('resImages');
  imagesEl.innerHTML = '';
  (data.images || []).forEach((img, i) => {
    const loc = img.location
      ? img.location + (img.locationEn ? ' (' + img.locationEn + ')' : '')
      : 'Unknown (No GPS)';
    const dt = img._exifDateTime || data.date || '';
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML =
      `<div class="img-card-header">📷 Photo ${i + 1}</div>` +
      `<div class="img-card-meta">🔐 Hash: ${esc(img.imageHash || '')}</div>` +
      `<div class="img-card-meta">📍 Location (GPS): ${esc(loc)}</div>` +
      `<div class="img-card-meta">📅 Date & Time: ${esc(dt)}</div>` +
      (img.r2ImageUrl ? `<img src="${img.r2ImageUrl}" alt="Photo ${i + 1}">` : '');
    imagesEl.appendChild(card);
  });

  updateCopyText();
}

function renderTagPreview() {
  const tags = document.getElementById('editTags').value.split(/\s+/).filter(Boolean);
  const el = document.getElementById('tagPreview');
  el.innerHTML = '';
  tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    el.appendChild(span);
  });
}

function updateCopyText() {
  const title = document.getElementById('editTitle').value;
  const body = document.getElementById('editBody').value;
  const tags = document.getElementById('editTags').value;
  const imgs = currentData?.images || [];

  const parts = [];
  if (title) parts.push(title);
  if (body) parts.push('', body);
  if (tags) parts.push('', tags);
  imgs.forEach((img, i) => {
    const loc = img.location
      ? img.location + (img.locationEn ? ' (' + img.locationEn + ')' : '')
      : 'Unknown (No GPS)';
    const dt = img._exifDateTime || currentData?.date || '';
    parts.push('', `📷 Photo ${i + 1}`);
    parts.push(`🔐 Hash: ${img.imageHash || ''}`);
    parts.push(`📍 Location (GPS): ${loc}`);
    parts.push(`📅 Date & Time: ${dt}`);
  });
  document.getElementById('copyText').textContent = parts.join('\n');
}

function enableEdit() {
  const titleEl = document.getElementById('editTitle');
  const bodyEl = document.getElementById('editBody');
  const tagsEl = document.getElementById('editTags');
  titleEl.readOnly = false;
  bodyEl.readOnly = false;
  tagsEl.readOnly = false;

  tagsEl.addEventListener('input', renderTagPreview);
  titleEl.addEventListener('input', updateCopyText);
  bodyEl.addEventListener('input', updateCopyText);
  tagsEl.addEventListener('input', updateCopyText);

  document.getElementById('editBtn').style.display = 'none';
  document.getElementById('publishBtn').style.display = '';

  document.getElementById('step2').className = 'step done';
  document.getElementById('step3').className = 'step active';
}

async function publish() {
  if (!currentData?.catchReportId) return;
  const publishBtn = document.getElementById('publishBtn');
  publishBtn.disabled = true;
  publishBtn.innerHTML = '<span class="spinner"></span> Posting...';
  document.getElementById('errMsg2').classList.remove('show');

  try {
    const res = await fetch(API_BASE + '/catch-reports/' + currentData.catchReportId, {
      method: 'PATCH',
      headers: { 'Authorization': AUTH, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: document.getElementById('editTitle').value,
        body: document.getElementById('editBody').value,
        hashtags: document.getElementById('editTags').value,
      }),
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${res.status}`);
    }

    publishBtn.style.display = 'none';
    document.getElementById('step3').className = 'step done';
    const msg = document.getElementById('successMsg');
    msg.textContent = 'Saved (ID: ' + currentData.catchReportId.slice(0, 8) + '...)';
    msg.classList.add('show');
  } catch (err) {
    document.getElementById('errMsg2').textContent = err.message;
    document.getElementById('errMsg2').classList.add('show');
    publishBtn.disabled = false;
    publishBtn.innerHTML = '📤 Post to Blog';
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function copyText() {
  const text = document.getElementById('copyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 1500);
  });
}
function reset() {
  photos.forEach(p => URL.revokeObjectURL(p.previewUrl));
  photos = [];
  currentData = null;
  document.getElementById('formSection').style.display = '';
  document.getElementById('resultSection').classList.remove('show');
  photoGrid.innerHTML = '';
  document.getElementById('comment').value = '';
  document.querySelectorAll('.fish-dropdown').forEach(d => {
    d.dataset.value = '';
    d.classList.remove('open');
    const list = d.querySelector('.fish-dropdown-list');
    if (list) list.hidden = true;
    const label = d.querySelector('.fish-dropdown-label');
    if (label) { label.textContent = '--'; label.classList.add('placeholder'); }
    const thumb = d.querySelector('.fish-dropdown-thumb');
    if (thumb) { thumb.hidden = true; thumb.removeAttribute('src'); }
  });
  document.querySelectorAll('.fish-weight').forEach(w => w.value = '');
  cameraInput.value = '';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '📝 Generate Article';
  errMsg.classList.remove('show');
  document.getElementById('errMsg2').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
  document.getElementById('editBtn').style.display = '';
  document.getElementById('publishBtn').style.display = 'none';
  document.getElementById('step1').className = 'step done';
  document.getElementById('step2').className = 'step active';
  document.getElementById('step3').className = 'step';
}
</script>
</body>
</html>
